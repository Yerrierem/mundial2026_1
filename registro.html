<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mundial 2026</title>
    <link rel="stylesheet" href="CSS/PaginaPrincipalCSS.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--form-bg);
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
        
        .auth-container h2 {
            color: var(--darker);
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 1.2rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--darker);
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: white;
            font-size: 1rem;
        }
        
        .btn-auth {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.3s;
            width: 100%;
            margin-top: 1rem;
        }
        
        .btn-auth:hover {
            background-color: var(--dark);
        }
        
        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text);
        }
        
        .auth-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
        
        .auth-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: 0.3rem;
            display: none;
        }
        
        /* Estilos para la subida de avatar */
        .avatar-upload {
            margin-bottom: 1.2rem;
            text-align: center;
        }
        
        .avatar-upload label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--darker);
        }
        
        .custom-avatar-upload {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--primary);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 10px;
        }
        
        .custom-avatar-upload:hover {
            background-color: var(--dark);
        }
        
        .custom-avatar-upload input[type="file"] {
            display: none;
        }
        
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 15px auto;
            border: 3px solid var(--primary);
            display: none;
        }
        
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .avatar-instructions {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- FORMULARIO DE REGISTRO -->
    <div class="auth-container">
        <h2>Crear Cuenta</h2>
        <form id="registroForm">
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" required>
                <div class="error-message" id="usernameError"></div>
            </div>
            
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required>
                <div class="error-message" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
                <div class="error-message" id="passwordError"></div>
            </div>
            
            <!-- Subida de avatar -->
            <div class="avatar-upload">
                <label>Imagen de perfil (opcional)</label>
                <div class="custom-avatar-upload">
                    <label for="customAvatar">Seleccionar imagen</label>
                    <input type="file" id="customAvatar" accept="image/*">
                </div>
                <div class="avatar-instructions">Formatos aceptados: JPG, PNG, GIF</div>
                
                <div class="avatar-preview" id="avatarPreview">
                    <img src="" alt="Vista previa">
                </div>
                
                <div class="error-message" id="avatarError"></div>
            </div>
            
            <button type="submit" class="btn-auth">Registrarse</button>
        </form>
        
        <div class="auth-link">
            ¿Ya tienes una cuenta? <a href="InicioSesion.html">Inicia sesión aquí</a>
        </div>
    </div>

    <script>
    // Variable para almacenar la imagen personalizada
    let customAvatarFile = null;
    
    // Subida de avatar personalizado
    document.getElementById('customAvatar').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            // Verificar que sea una imagen
            if (!file.type.match('image.*')) {
                document.getElementById('avatarError').textContent = 'Por favor selecciona un archivo de imagen válido';
                document.getElementById('avatarError').style.display = 'block';
                this.value = '';
                return;
            }
            
            // Verificar tamaño del archivo (máximo 2MB)
            if (file.size > 2 * 1024 * 1024) {
                document.getElementById('avatarError').textContent = 'La imagen no debe superar los 2MB';
                document.getElementById('avatarError').style.display = 'block';
                this.value = '';
                return;
            }
            
            // Mostrar vista previa
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('avatarPreview');
                preview.querySelector('img').src = e.target.result;
                preview.style.display = 'block';
                customAvatarFile = file;
                
                // Ocultar mensaje de error si existe
                document.getElementById('avatarError').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });
    
    // Validación del formulario
    document.getElementById('registroForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Resetear mensajes de error
        document.querySelectorAll('.error-message').forEach(el => {
            el.style.display = 'none';
        });
        
        // Obtener valores
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        let isValid = true;
        
        // Validaciones básicas
        if (username.length < 3) {
            document.getElementById('usernameError').textContent = 'El nombre de usuario debe tener al menos 3 caracteres';
            document.getElementById('usernameError').style.display = 'block';
            isValid = false;
        }
        
        if (!email.includes('@') || !email.includes('.')) {
            document.getElementById('emailError').textContent = 'Por favor ingresa un correo electrónico válido';
            document.getElementById('emailError').style.display = 'block';
            isValid = false;
        }
        
        // Validación de contraseña más robusta
        const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{4,}$/;
        if (!passwordRegex.test(password)) {
            document.getElementById('passwordError').textContent = 'La contraseña debe tener al menos 4 caracteres, incluir mayúsculas, minúsculas, números y caracteres especiales';
            document.getElementById('passwordError').style.display = 'block';
            isValid = false;
        }
        
        if (isValid) {
            // Crear FormData para enviar al servidor
            const formData = new FormData();
            formData.append('username', username);
            formData.append('email', email);
            formData.append('password', password);
            
            // Agregar la imagen si existe
            if (customAvatarFile) {
                formData.append('avatar', customAvatarFile);
            }
            
            // Enviar datos al servidor
            fetch('procesar_registro.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('¡Registro exitoso! Serás redirigido a la página de inicio de sesión.');
                    window.location.href = 'InicioSesion.html';
                } else {
                    // Mostrar mensaje de error
                    if (data.message.includes('usuario')) {
                        document.getElementById('usernameError').textContent = data.message;
                        document.getElementById('usernameError').style.display = 'block';
                    } else if (data.message.includes('correo')) {
                        document.getElementById('emailError').textContent = data.message;
                        document.getElementById('emailError').style.display = 'block';
                    } else {
                        alert('Error: ' + data.message);
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error al conectar con el servidor');
            });
        }
    });
</script>
</body>
</html>
