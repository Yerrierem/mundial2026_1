<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Realidad Aumentada - Banderas Mundialistas</title>
    
    <!-- Importar librerías necesarias -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "mindar-image-three": "https://unpkg.com/mindar-image-three@1.2.0/dist/mindar-image-three.js"
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
            overflow: hidden;
            background-color: #0a3d0a;
        }

        /* Contenedor principal de AR */
        #mindar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Interfaz de usuario (Capa superior) */
        .ui-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
        }

        .top-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            pointer-events: none;
        }

        #pais-activo {
            background: linear-gradient(to right, #FF8C00, #FFA500);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
            box-shadow: 0 6px 0 #cc7000;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #0a3d0a;
            display: none;
            animation: bounce 0.5s ease;
        }

        .bottom-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            padding-bottom: 30px;
            pointer-events: none;
        }

        .instrucciones {
            pointer-events: none;
            color: white;
            background: linear-gradient(135deg, #0a3d0a, #1e6b1e);
            padding: 15px 25px;
            border-radius: 50px;
            text-align: center;
            max-width: 280px;
            border: 3px solid #FF8C00;
            box-shadow: 0 6px 0 #063106;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        .mensaje-detalle {
            pointer-events: none;
            color: white;
            background: linear-gradient(135deg, #0a3d0a, #1e6b1e);
            padding: 15px 25px;
            border-radius: 50px;
            text-align: center;
            max-width: 280px;
            border: 3px solid #FF8C00;
            box-shadow: 0 6px 0 #063106;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            display: none;
        }

        #boton-animacion {
            pointer-events: auto;
            padding: 16px 32px;
            background: linear-gradient(to right, #0a3d0a, #1e6b1e);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #063106;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #FF8C00;
            font-size: 1.1rem;
            display: none;
            min-width: 200px;
        }

        #boton-animacion:hover {
            background: linear-gradient(to right, #1e6b1e, #0a3d0a);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 9px 0 #063106;
        }

        #boton-animacion:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #063106;
        }

        #boton-volver {
            pointer-events: auto;
            padding: 12px 24px;
            background: linear-gradient(to right, #FF8C00, #FFA500);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #cc7000;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #0a3d0a;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            min-width: 180px;
            text-align: center;
        }

        #boton-volver:hover {
            background: linear-gradient(to right, #FFA500, #FF8C00);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 9px 0 #cc7000;
        }

        #boton-volver:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #cc7000;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Decoración */
        .ui-container::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: repeating-linear-gradient(90deg, #0a3d0a, #0a3d0a 20px, #FF8C00 20px, #FF8C00 40px);
            z-index: 11;
            pointer-events: none;
        }

        .ui-container::after {
            content: "";
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: repeating-linear-gradient(90deg, #FF8C00, #FF8C00 20px, #0a3d0a 20px, #0a3d0a 40px);
            z-index: 11;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="mindar-container"></div>

    <div class="ui-container">
        <div class="top-container">
            <div id="pais-activo"></div>
        </div>
        
        <div class="bottom-container">
            <div class="instrucciones" id="instrucciones">🏆 Apunta a una bandera mundialista 🏆</div>
            <div class="mensaje-detalle" id="mensaje-detalle"></div>
            <button id="boton-animacion">▶️ Ver Animación</button>
            <a href="index.html" id="boton-volver">⬅️ Volver al Inicio</a>
        </div>
    </div>

    <script type="module">
        import * as THREE from "three";
        import { MindARThree } from "mindar-image-three";

        // ==================== CONFIGURACIÓN DE PAÍSES ====================
        // Orden alfabético según tu targets.mind:
        // 0: Argentina, 1: Australia, 2: Brasil, 3: Canadá, 4: Colombia, 
        // 5: CoreaSur, 6: EstadosUnidos, 7: Francia, 8: Inglaterra, 
        // 9: Japón, 10: México, 11: Uruguay
        
        const paises = [
            { id: 'argentina', nombre: 'Argentina', targetIndex: 0, modeloEstatico: './assets/Argentina.glb', modeloAnimado: './assets/ArgentinaA.glb', color: '#75AADB' },
            { id: 'australia', nombre: 'Australia', targetIndex: 1, modeloEstatico: './assets/Australia.glb', modeloAnimado: './assets/AustraliaA.glb', color: '#00008B' },
            { id: 'brasil', nombre: 'Brasil', targetIndex: 2, modeloEstatico: './assets/Brasil.glb', modeloAnimado: './assets/BrasilA.glb', color: '#009C3B' },
            { id: 'canada', nombre: 'Canadá', targetIndex: 3, modeloEstatico: './assets/Canada.glb', modeloAnimado: './assets/CanadaA.glb', color: '#FF0000' },
            { id: 'colombia', nombre: 'Colombia', targetIndex: 4, modeloEstatico: './assets/Colombia.glb', modeloAnimado: './assets/ColombiaA.glb', color: '#FCD116' },
            { id: 'coreasur', nombre: 'Corea del Sur', targetIndex: 5, modeloEstatico: './assets/CoreaSur.glb', modeloAnimado: './assets/CoreaSurA.glb', color: '#0047A0' },
            { id: 'estadosunidos', nombre: 'Estados Unidos', targetIndex: 6, modeloEstatico: './assets/EstadosUnidos.glb', modeloAnimado: './assets/EstadosUnidosA.glb', color: '#B22234' },
            { id: 'francia', nombre: 'Francia', targetIndex: 7, modeloEstatico: './assets/Francia.glb', modeloAnimado: './assets/FranciaA.glb', color: '#0055A4' },
            { id: 'inglaterra', nombre: 'Inglaterra', targetIndex: 8, modeloEstatico: './assets/Inglaterra.glb', modeloAnimado: './assets/InglaterraA.glb', color: '#CE1124' },
            { id: 'japon', nombre: 'Japón', targetIndex: 9, modeloEstatico: './assets/Japon.glb', modeloAnimado: './assets/JaponA.glb', color: '#BC002D' },
            { id: 'mexico', nombre: 'México', targetIndex: 10, modeloEstatico: './assets/Mexico.glb', modeloAnimado: './assets/MexicoA.glb', color: '#CE1126' },
            { id: 'uruguay', nombre: 'Uruguay', targetIndex: 11, modeloEstatico: './assets/Uruguay.glb', modeloAnimado: './assets/UruguayA.glb', color: '#0038A8' }
        ];

        // Elementos DOM
        const instruccionesDiv = document.getElementById("instrucciones");
        const mensajeDetalle = document.getElementById("mensaje-detalle");
        const botonAnimacion = document.getElementById("boton-animacion");
        const paisActivoDiv = document.getElementById("pais-activo");
        
        // Variables de estado
        let currentCountry = null;
        let currentModelStatic = null;
        let currentModelAnimated = null;
        let isAnimated = false;
        let mixer = null;
        let clock = new THREE.Clock();
        let mindarThree = null;
        
        const anchors = {};

        // ==================== FUNCIÓN PARA CARGAR MODELOS ====================
        async function loadModel(url, isAnimatedModel = false) {
            return new Promise((resolve, reject) => {
                const loader = new THREE.GLTFLoader();
                loader.load(url, (gltf) => {
                    const model = gltf.scene;
                    
                    // Si es modelo animado y tiene animaciones
                    if (isAnimatedModel && gltf.animations && gltf.animations.length > 0) {
                        model.userData = { animations: gltf.animations };
                    }
                    
                    // Escalar y posicionar el modelo
                    model.scale.set(0.5, 0.5, 0.5);
                    model.position.set(0, -0.5, 0);
                    
                    resolve(model);
                }, undefined, reject);
            });
        }

        // ==================== FUNCIÓN PARA CREAR TEXTO FLOTANTE ====================
        function createTextLabel(text, color) {
            const canvas = document.createElement("canvas");
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext("2d");
            
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = color;
            ctx.font = "Bold 40px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, canvas.width/2, canvas.height/2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(1.5, 0.75, 1);
            sprite.position.set(0, 0.8, 0);
            
            return sprite;
        }

        // ==================== DETECCIÓN DE BANDERA ====================
        async function onFlagDetected(countryId) {
            const pais = paises.find(p => p.id === countryId);
            if (!pais) return;
            
            currentCountry = pais;
            
            // Actualizar UI
            paisActivoDiv.style.display = "block";
            paisActivoDiv.innerHTML = `📍 ${pais.nombre}`;
            instruccionesDiv.style.display = "none";
            mensajeDetalle.style.display = "block";
            mensajeDetalle.innerHTML = `✅ ${pais.nombre} detectado`;
            botonAnimacion.style.display = "block";
            
            const group = anchors[pais.id].group;
            
            // Limpiar grupo
            while(group.children.length > 0) {
                group.remove(group.children[0]);
            }
            
            // Agregar texto flotante
            const textSprite = createTextLabel(pais.nombre, pais.color);
            group.add(textSprite);
            
            // Cargar modelo estático
            try {
                const staticModel = await loadModel(pais.modeloEstatico, false);
                staticModel.userData = { isStatic: true };
                group.add(staticModel);
                currentModelStatic = staticModel;
                
                // Cargar modelo animado
                const animatedModel = await loadModel(pais.modeloAnimado, true);
                animatedModel.visible = false;
                animatedModel.userData = { isStatic: false, animations: animatedModel.userData?.animations || [] };
                group.add(animatedModel);
                currentModelAnimated = animatedModel;
                
                // Configurar animaciones si existen
                if (animatedModel.userData.animations && animatedModel.userData.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(animatedModel);
                    const action = mixer.clipAction(animatedModel.userData.animations[0]);
                    action.stop();
                    animatedModel.userData.action = action;
                }
                
            } catch (error) {
                console.error("Error cargando modelos:", error);
                mensajeDetalle.innerHTML = "❌ Error cargando modelo 3D";
            }
        }
        
        function onFlagLost() {
            if (currentCountry) {
                currentCountry = null;
                currentModelStatic = null;
                currentModelAnimated = null;
                isAnimated = false;
                
                // Resetear UI
                paisActivoDiv.style.display = "none";
                instruccionesDiv.style.display = "block";
                mensajeDetalle.style.display = "none";
                botonAnimacion.style.display = "none";
                botonAnimacion.textContent = "▶️ Ver Animación";
                
                // Detener animación si estaba activa
                if (mixer) {
                    mixer.stopAllAction();
                    mixer = null;
                }
            }
        }

        // ==================== INICIALIZAR MINDAR ====================
        async function initMindAR() {
            try {
                mindarThree = new MindARThree({
                    container: document.querySelector('#mindar-container'),
                    imageTargetSrc: 'targets.mind', // Tu archivo con las 12 banderas en orden alfabético
                    uiLoading: 'none',
                    uiError: 'none',
                    uiScanning: 'none'
                });
                
                const { renderer, scene, camera } = mindarThree;
                
                // Crear anchors para cada país
                paises.forEach(pais => {
                    try {
                        anchors[pais.id] = mindarThree.addAnchor(pais.targetIndex);
                        anchors[pais.id].group.visible = false;
                        
                        anchors[pais.id].onTargetFound = () => {
                            console.log(`✅ Detectado: ${pais.nombre}`);
                            anchors[pais.id].group.visible = true;
                            onFlagDetected(pais.id);
                        };
                        
                        anchors[pais.id].onTargetLost = () => {
                            console.log(`❌ Perdido: ${pais.nombre}`);
                            anchors[pais.id].group.visible = false;
                            onFlagLost();
                        };
                        
                    } catch (e) {
                        console.warn(`Error creando anchor para ${pais.nombre}:`, e);
                    }
                });
                
                // Iluminación mejorada
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(1, 2, 1);
                scene.add(directionalLight);
                
                const backLight = new THREE.DirectionalLight(0xffffff, 0.4);
                backLight.position.set(-1, 1, -1);
                scene.add(backLight);
                
                // Iniciar MindAR
                await mindarThree.start();
                console.log("🎯 MindAR iniciado correctamente");
                
                // Loop de renderizado
                renderer.setAnimationLoop(() => {
                    renderer.render(scene, camera);
                    if (mixer) {
                        const delta = clock.getDelta();
                        mixer.update(delta);
                    }
                });
                
            } catch (err) {
                console.error('❌ Error inicializando MindAR:', err);
                instruccionesDiv.innerHTML = "⚠️ Error: No se pudo iniciar la cámara AR";
            }
        }
        
        // ==================== MANEJAR BOTÓN DE ANIMACIÓN ====================
        botonAnimacion.addEventListener("click", () => {
            if (!currentCountry || !currentModelStatic || !currentModelAnimated) return;
            
            if (!isAnimated) {
                // Cambiar a animado
                currentModelStatic.visible = false;
                currentModelAnimated.visible = true;
                
                // Reproducir animación
                if (currentModelAnimated.userData.action) {
                    currentModelAnimated.userData.action.reset();
                    currentModelAnimated.userData.action.play();
                }
                
                botonAnimacion.textContent = "⏹️ Ver Estático";
                isAnimated = true;
                mensajeDetalle.innerHTML = `🎬 ${currentCountry.nombre} - Modo Animación`;
            } else {
                // Cambiar a estático
                currentModelStatic.visible = true;
                currentModelAnimated.visible = false;
                
                // Detener animación
                if (currentModelAnimated.userData.action) {
                    currentModelAnimated.userData.action.stop();
                }
                
                botonAnimacion.textContent = "▶️ Ver Animación";
                isAnimated = false;
                mensajeDetalle.innerHTML = `🎨 ${currentCountry.nombre} - Modo Estático`;
            }
        });
        
        // Iniciar aplicación
        initMindAR();
    </script>
</body>
</html>
