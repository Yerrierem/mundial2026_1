<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Realidad Aumentada - Banderas del Mundo</title>
    <!-- A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 12px 20px;
            text-align: center;
            color: white;
            z-index: 998;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        .info-panel.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        a-scene {
            width: 100%;
            height: 100vh;
        }

        #toggle-animation-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #1e2a78, #0f172a);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            z-index: 999;
            display: none;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.2s;
            font-family: inherit;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        #toggle-animation-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #2a3a9a, #1e2a6a);
        }
        
        #toggle-animation-btn:active {
            transform: scale(0.98);
        }
        
        @media (max-width: 600px) {
            #toggle-animation-btn {
                padding: 8px 18px;
                font-size: 14px;
                top: 16px;
                right: 16px;
            }
            .info-panel {
                font-size: 12px;
                bottom: 16px;
                left: 16px;
                right: 16px;
                padding: 8px 16px;
            }
        }
        
        /* Estilo para loading opcional */
        .loading-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1000;
            font-size: 14px;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="info-panel" id="info-panel">
        🏁 Escanea una bandera para ver el modelo 3D del país
    </div>

    <button id="toggle-animation-btn">🎬 Ver Animación</button>

    <script>
        // Registrar el componente de animación personalizado (manejo de clips GLTF)
        AFRAME.registerComponent('custom-animation-mixer', {
            schema: {
                clipIndex: { type: 'int', default: 0 },
                clipName: { type: 'string', default: '' },
                autoPlay: { type: 'boolean', default: false },  // manual mediante botón
                loop: { type: 'boolean', default: true },
                timeScale: { type: 'number', default: 1 }
            },
            
            init: function() {
                this.mixer = null;
                this.actions = [];
                this.animations = [];
                this.isPlaying = false;
                this.model = null;
                
                this.el.addEventListener('model-loaded', (e) => {
                    this.model = e.detail.model;
                    this.setupAnimations(this.model);
                });
            },
            
            setupAnimations: function(model) {
                this.animations = [];
                this.actions = [];
                if (!model) return;
                
                model.traverse((node) => {
                    if (node.animations && node.animations.length > 0) {
                        node.animations.forEach((clip) => {
                            this.animations.push({
                                name: clip.name,
                                clip: clip,
                                node: node
                            });
                        });
                    }
                });
                
                if (this.animations.length > 0 && typeof THREE !== 'undefined' && THREE.AnimationMixer) {
                    this.mixer = new THREE.AnimationMixer(model);
                    this.animations.forEach((anim) => {
                        const action = this.mixer.clipAction(anim.clip);
                        action.clipName = anim.name;
                        this.actions.push(action);
                    });
                    
                    if (this.data.autoPlay) {
                        this.playAnimation();
                    }
                } else if (this.animations.length > 0) {
                    console.warn("THREE.AnimationMixer no disponible, pero se encontraron animaciones.");
                }
            },
            
            playAnimation: function(clipIndex = null) {
                if (!this.mixer || this.actions.length === 0) {
                    return;
                }
                const index = (clipIndex !== null) ? clipIndex : this.data.clipIndex;
                if (index >= this.actions.length) return;
                
                this.stopAnimation();
                const action = this.actions[index];
                if (this.data.loop) {
                    action.setLoop(THREE.LoopRepeat, Infinity);
                } else {
                    action.setLoop(THREE.LoopOnce, 1);
                }
                action.setEffectiveTimeScale(this.data.timeScale);
                action.play();
                this.isPlaying = true;
            },
            
            stopAnimation: function() {
                if (!this.mixer) return;
                this.actions.forEach(action => action.stop());
                this.isPlaying = false;
            },
            
            tick: function(time, delta) {
                if (this.mixer && this.isPlaying) {
                    const deltaSeconds = delta / 1000;
                    this.mixer.update(deltaSeconds);
                }
            }
        });
        
        // ---- Lógica de control y alternancia entre estático / animado ----
        const infoPanel = document.getElementById("info-panel");
        const toggleBtn = document.getElementById("toggle-animation-btn");
        let isAnimatedMode = false;     // false = estático (default), true = animado
        let currentActiveCountry = null; // almacena el id del país activo (ej: 'argentina', 'australia', etc)
        
        // Mapeo de IDs de elementos target a nombre de país (clave única)
        const targetToCountry = {
            'target-argentina': 'argentina',
            'target-australia': 'australia',
            'target-brasil': 'brasil',
            'target-canada': 'canada',
            'target-corea': 'corea',
            'target-uruguay': 'uruguay',
            'target-usa': 'usa',
            'target-francia': 'francia',
            'target-japon': 'japon',
            'target-colombia': 'colombia',
            'target-mexico': 'mexico',
            'target-inglaterra': 'inglaterra'
        };
        
        // Configuración de cada país (prefijos para IDs de texto y modelos)
        const countryConfig = {
            argentina: { prefix: 'argentina', nombreMostrar: 'ARGENTINA' },
            australia: { prefix: 'australia', nombreMostrar: 'AUSTRALIA' },
            brasil: { prefix: 'brasil', nombreMostrar: 'BRASIL' },
            canada: { prefix: 'canada', nombreMostrar: 'CANADÁ' },
            corea: { prefix: 'corea', nombreMostrar: 'COREA DEL SUR' },
            uruguay: { prefix: 'uruguay', nombreMostrar: 'URUGUAY' },
            usa: { prefix: 'usa', nombreMostrar: 'ESTADOS UNIDOS' },
            francia: { prefix: 'francia', nombreMostrar: 'FRANCIA' },
            japon: { prefix: 'japon', nombreMostrar: 'JAPÓN' },
            colombia: { prefix: 'colombia', nombreMostrar: 'COLOMBIA' },
            mexico: { prefix: 'mexico', nombreMostrar: 'MÉXICO' },
            inglaterra: { prefix: 'inglaterra', nombreMostrar: 'INGLATERRA' }
        };
        
        // Función para ocultar todos los modelos y texto de un país específico
        function hideCountryModels(countryId) {
            const cfg = countryConfig[countryId];
            if (!cfg) return;
            const textoId = `texto-${cfg.prefix}`;
            const estaticoId = `modelo-${cfg.prefix}-estatico`;
            const animadoId = `modelo-${cfg.prefix}-animado`;
            const textoEl = document.getElementById(textoId);
            const estaticoEl = document.getElementById(estaticoId);
            const animadoEl = document.getElementById(animadoId);
            if (textoEl) textoEl.setAttribute('visible', 'false');
            if (estaticoEl) estaticoEl.setAttribute('visible', 'false');
            if (animadoEl) {
                animadoEl.setAttribute('visible', 'false');
                const animComp = animadoEl.components['custom-animation-mixer'];
                if (animComp) animComp.stopAnimation();
            }
        }
        
        // Mostrar el país según el modo actual (estático o animado)
        function showCountryByMode(countryId) {
            const cfg = countryConfig[countryId];
            if (!cfg) return;
            const textoId = `texto-${cfg.prefix}`;
            const estaticoId = `modelo-${cfg.prefix}-estatico`;
            const animadoId = `modelo-${cfg.prefix}-animado`;
            const textoEl = document.getElementById(textoId);
            const estaticoEl = document.getElementById(estaticoId);
            const animadoEl = document.getElementById(animadoId);
            
            if (textoEl) textoEl.setAttribute('visible', 'true');
            
            if (!isAnimatedMode) {
                // Modo estático por defecto
                if (estaticoEl) estaticoEl.setAttribute('visible', 'true');
                if (animadoEl) {
                    animadoEl.setAttribute('visible', 'false');
                    const animComp = animadoEl.components['custom-animation-mixer'];
                    if (animComp) animComp.stopAnimation();
                }
                toggleBtn.textContent = "🎬 Ver Animación";
            } else {
                // Modo animado
                if (estaticoEl) estaticoEl.setAttribute('visible', 'false');
                if (animadoEl) {
                    animadoEl.setAttribute('visible', 'true');
                    const animComp = animadoEl.components['custom-animation-mixer'];
                    if (animComp && !animComp.isPlaying) {
                        animComp.playAnimation();
                    }
                }
                toggleBtn.textContent = "⏹️ Ver Estático";
            }
        }
        
        // Actualizar la interfaz cuando cambia el país activo o se pierde
        function setActiveCountry(countryId) {
            // Si ya hay un país activo y es diferente, ocultar el anterior
            if (currentActiveCountry && currentActiveCountry !== countryId) {
                hideCountryModels(currentActiveCountry);
            }
            currentActiveCountry = countryId;
            if (countryId) {
                showCountryByMode(countryId);
                infoPanel.classList.add('hidden');
                toggleBtn.style.display = "block";
            } else {
                infoPanel.classList.remove('hidden');
                toggleBtn.style.display = "none";
            }
        }
        
        // Eventos para cada target: targetFound y targetLost
        Object.keys(targetToCountry).forEach(targetId => {
            const targetEl = document.getElementById(targetId);
            if (!targetEl) return;
            const country = targetToCountry[targetId];
            
            targetEl.addEventListener("targetFound", () => {
                setActiveCountry(country);
            });
            
            targetEl.addEventListener("targetLost", () => {
                // Verificar si realmente ningún otro target está visible
                // Usamos mindar-image para comprobar si hay algún target detectado
                setTimeout(() => {
                    const sceneEl = document.querySelector('a-scene');
                    const mindarComp = sceneEl ? sceneEl.components['mindar-image'] : null;
                    let anyFound = false;
                    if (mindarComp && mindarComp.data) {
                        // Revisar el estado de los targets (propiedad interna). 
                        // Alternativa: verificar si algún target tiene evento reciente, por simplicidad comprobamos si el current sigue siendo el mismo y si se pierde y no hay otro targetFound activo 
                        // Lo hacemos a través de una verificación de visibilidad rápida: si en 200ms no se detecta otro, limpiamos.
                        // Pero como cada targetLost puede llamarse, usamos un timeout y verificamos si currentActiveCountry sigue siendo este país.
                        if (currentActiveCountry === country) {
                            // Esperamos breve y si ningún otro target ha tomado el relevo, limpiamos
                            setTimeout(() => {
                                // Verificar si algún target vinculado a otro país está encontrado (chequeo no trivial), mejor usar bandera global:
                                let otherFound = false;
                                for (let otherTargetId of Object.keys(targetToCountry)) {
                                    if (otherTargetId !== targetId) {
                                        const otherEl = document.getElementById(otherTargetId);
                                        // Propiedad expuesta? No directa. Usamos una variable compartida. 
                                        // Para simplicidad, confiamos en que si se pierde y no se activó otro en 200ms, limpiamos.
                                    }
                                }
                                if (currentActiveCountry === country) {
                                    // Si aún es este país sin que otro lo reemplazara, lo ocultamos.
                                    hideCountryModels(country);
                                    currentActiveCountry = null;
                                    infoPanel.classList.remove('hidden');
                                    toggleBtn.style.display = "none";
                                    isAnimatedMode = false; // reset modo visual pero conservamos estado, al reaparecer vuelve a estático
                                    // Sincronizar botón
                                    toggleBtn.textContent = "🎬 Ver Animación";
                                }
                            }, 150);
                        }
                    } else {
                        if (currentActiveCountry === country) {
                            hideCountryModels(country);
                            currentActiveCountry = null;
                            infoPanel.classList.remove('hidden');
                            toggleBtn.style.display = "none";
                            isAnimatedMode = false;
                            toggleBtn.textContent = "🎬 Ver Animación";
                        }
                    }
                }, 100);
            });
        });
        
        // Función para manejar el botón toggle: alterna entre estático y animado para el país actual
        toggleBtn.addEventListener("click", () => {
            if (!currentActiveCountry) return;
            // Alternar modo
            isAnimatedMode = !isAnimatedMode;
            // Actualizar visibilidad según nuevo modo
            const cfg = countryConfig[currentActiveCountry];
            if (cfg) {
                const estaticoEl = document.getElementById(`modelo-${cfg.prefix}-estatico`);
                const animadoEl = document.getElementById(`modelo-${cfg.prefix}-animado`);
                if (!isAnimatedMode) {
                    // Cambiar a estático
                    if (estaticoEl) estaticoEl.setAttribute('visible', 'true');
                    if (animadoEl) {
                        animadoEl.setAttribute('visible', 'false');
                        const animComp = animadoEl.components['custom-animation-mixer'];
                        if (animComp) animComp.stopAnimation();
                    }
                    toggleBtn.textContent = "🎬 Ver Animación";
                } else {
                    // Cambiar a animado
                    if (estaticoEl) estaticoEl.setAttribute('visible', 'false');
                    if (animadoEl) {
                        animadoEl.setAttribute('visible', 'true');
                        const animComp = animadoEl.components['custom-animation-mixer'];
                        if (animComp && !animComp.isPlaying) animComp.playAnimation();
                    }
                    toggleBtn.textContent = "⏹️ Ver Estático";
                }
            }
        });
        
        // Inicialmente aseguramos que no haya nada mostrado
        window.addEventListener('load', () => {
            toggleBtn.style.display = "none";
            infoPanel.classList.remove('hidden');
            isAnimatedMode = false;
        });
        
        // Manejo de errores de carga de assets (opcional)
        console.log("AR Listo - escanea banderas en orden: Argentina, Australia, Brasil, Canadá, Corea del Sur, Uruguay, Estados Unidos, Francia, Japón, Colombia, México, Inglaterra");
    </script>
</body>
</html>
