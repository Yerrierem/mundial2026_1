<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mundial 2026</title>
    <link rel="stylesheet" href="CSS/PaginaPrincipalCSS.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--form-bg);
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
        
        .auth-container h2 {
            color: var(--darker);
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 1.2rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--darker);
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: white;
            font-size: 1rem;
        }
        
        .btn-auth {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.3s;
            width: 100%;
            margin-top: 1rem;
        }
        
        .btn-auth:hover {
            background-color: var(--dark);
        }
        
        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text);
        }
        
        .auth-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
        
        .auth-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: 0.3rem;
            display: none;
        }
        
        .demo-accounts {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #e8f4ff;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        .demo-accounts h3 {
            margin-bottom: 0.5rem;
            color: var(--darker);
        }
    </style>
</head>
<body>
    <!-- FORMULARIO DE INICIO DE SESIÓN -->
    <div class="auth-container">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Correo Electrónico</label>
                <input type="email" id="loginEmail" name="email" required>
                <div class="error-message" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <label for="loginPassword">Contraseña</label>
                <input type="password" id="loginPassword" name="password" required>
                <div class="error-message" id="passwordError"></div>
            </div>
            
            <button type="submit" class="btn-auth">Iniciar Sesión</button>
        </form>
        
        <div class="auth-link">
            ¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
        </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Resetear mensajes de error
        document.querySelectorAll('.error-message').forEach(el => {
            el.style.display = 'none';
        });
        
        // Obtener valores
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        // Validar campos
        if (!email || !password) {
            document.getElementById('passwordError').textContent = 'Por favor completa todos los campos';
            document.getElementById('passwordError').style.display = 'block';
            return;
        }
        
        // Enviar datos al servidor para verificación
        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);
        
        fetch('procesar_login.php', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Guardar datos de sesión
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('userEmail', data.email);
                sessionStorage.setItem('userName', data.username);
                sessionStorage.setItem('userId', data.userId);
                
                // Redirigir a página principal
                alert('¡Inicio de sesión exitoso!');
                window.location.href = 'PaginaPrincipal.html';
            } else {
                document.getElementById('passwordError').textContent = data.message;
                document.getElementById('passwordError').style.display = 'block';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('passwordError').textContent = 'Error al conectar con el servidor';
            document.getElementById('passwordError').style.display = 'block';
        });
    });
</script>
</body>
</html>
